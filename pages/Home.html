<!DOCTYPE html>
<html>

<head>
  <base target="_top">
  <?!= include('components/Styles') ?>
  <style>
    .home-body {
      display: flex;
      flex-direction: column;
      height: calc(100vh - 57px);
      overflow: hidden;
    }

    /* ── Category tabs ── */
    .category-tabs {
      display: flex;
      gap: 0;
      padding: 0 16px;
      border-bottom: 1px solid var(--border);
      background: var(--bg-2);
      flex-shrink: 0;
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
      scrollbar-width: none;
    }

    .category-tabs::-webkit-scrollbar {
      display: none;
    }

    .cat-tab {
      padding: 11px 16px;
      cursor: pointer;
      font-size: 13px;
      font-weight: 600;
      color: var(--text-3);
      border-bottom: 2px solid transparent;
      transition: var(--transition);
      white-space: nowrap;
      -webkit-tap-highlight-color: transparent;
    }

    .cat-tab:hover {
      color: var(--text-2);
    }

    .cat-tab.active {
      color: var(--accent);
      border-bottom-color: var(--accent);
    }

    /* ── Menu ── */
    .pos-main {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .menu-grid-wrap {
      flex: 1;
      overflow-y: auto;
      padding: 14px 16px;
      -webkit-overflow-scrolling: touch;
    }

    .menu-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 10px;
    }

    .menu-card {
      background: var(--bg-2);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 14px 12px;
      cursor: pointer;
      transition: var(--transition);
      user-select: none;
      position: relative;
      -webkit-tap-highlight-color: transparent;
      box-shadow: var(--shadow-sm);
    }

    .menu-card:active {
      transform: scale(0.97);
      border-color: var(--accent);
    }

    .menu-card.unavailable {
      opacity: 0.38;
      cursor: not-allowed;
    }

    .menu-card-icon {
      width: 40px;
      height: 40px;
      background: var(--bg-3);
      border-radius: var(--radius-sm);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      margin-bottom: 10px;
    }

    .menu-card-name {
      font-family: var(--font-head);
      font-size: 12.5px;
      font-weight: 700;
      color: var(--text);
      margin-bottom: 4px;
      line-height: 1.3;
    }

    .menu-card-price {
      font-size: 12px;
      color: var(--accent);
      font-weight: 600;
    }

    .menu-card-cat {
      font-size: 10.5px;
      color: var(--text-3);
      margin-bottom: 6px;
      text-transform: uppercase;
      letter-spacing: 0.4px;
    }

    .menu-card-badge {
      position: absolute;
      top: 8px;
      right: 8px;
      background: var(--accent);
      color: #fff;
      border-radius: 10px;
      width: 20px;
      height: 20px;
      font-size: 11px;
      font-weight: 700;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* ── Cart FAB ── */
    .cart-fab {
      display: none;
      position: fixed;
      bottom: calc(var(--bottom-nav-h) + 14px);
      right: 16px;
      z-index: 350;
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: 28px;
      height: 50px;
      padding: 0 20px;
      font-family: var(--font-head);
      font-size: 13.5px;
      font-weight: 700;
      cursor: pointer;
      align-items: center;
      gap: 8px;
      box-shadow: 0 4px 20px rgba(59, 91, 252, 0.38);
      transition: var(--transition);
      -webkit-tap-highlight-color: transparent;
    }

    .cart-fab:active {
      transform: scale(0.96);
    }

    .cart-fab-count {
      background: rgba(255, 255, 255, 0.22);
      border-radius: 12px;
      min-width: 24px;
      height: 22px;
      font-size: 12px;
      font-weight: 800;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 0 6px;
    }

    /* ── Cart Drawer ── */
    .cart-drawer-overlay {
      position: fixed;
      inset: 0;
      background: rgba(17, 19, 24, 0.5);
      z-index: 400;
      backdrop-filter: blur(4px);
      opacity: 0;
      pointer-events: none;
      transition: opacity var(--transition);
    }

    .cart-drawer-overlay.open {
      opacity: 1;
      pointer-events: all;
    }

    .cart-panel {
      display: flex;
      flex-direction: column;
      background: var(--bg-2);
      overflow: hidden;
      position: fixed;
      bottom: var(--bottom-nav-h);
      left: 0;
      right: 0;
      z-index: 450;
      border-radius: 20px 20px 0 0;
      border: 1px solid var(--border);
      border-bottom: none;
      max-height: calc(100vh - var(--bottom-nav-h) - 16px);
      transform: translateY(calc(100% + var(--bottom-nav-h)));
      transition: transform 0.28s cubic-bezier(0.4, 0, 0.2, 1);
      box-shadow: var(--shadow-lg);
    }

    .cart-panel.open {
      transform: translateY(0);
    }

    .cart-drag-handle {
      width: 36px;
      height: 4px;
      background: var(--border-2);
      border-radius: 2px;
      margin: 12px auto 6px;
      flex-shrink: 0;
    }

    .cart-header {
      padding: 4px 18px 12px;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }

    .cart-title {
      font-family: var(--font-head);
      font-size: 15px;
      font-weight: 700;
      color: var(--text);
    }

    .cart-items {
      flex: 1;
      overflow-y: auto;
      padding: 10px 18px;
      -webkit-overflow-scrolling: touch;
      min-height: 0;
    }

    .cart-item {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      padding: 10px 0;
      border-bottom: 1px solid var(--border);
    }

    .cart-item:last-child {
      border-bottom: none;
    }

    .cart-item-icon {
      width: 36px;
      height: 36px;
      background: var(--bg-3);
      border-radius: var(--radius-xs);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      flex-shrink: 0;
    }

    .cart-item-info {
      flex: 1;
      min-width: 0;
    }

    .cart-item-name {
      font-size: 13px;
      font-weight: 600;
      color: var(--text);
    }

    .cart-item-price {
      font-size: 12px;
      color: var(--text-3);
      margin-top: 2px;
    }

    .cart-item-subtotal {
      font-size: 13px;
      font-weight: 700;
      color: var(--text);
      white-space: nowrap;
    }

    .qty-ctrl {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-top: 7px;
    }

    .qty-btn {
      width: 28px;
      height: 28px;
      background: var(--bg-3);
      border: 1px solid var(--border);
      border-radius: var(--radius-xs);
      cursor: pointer;
      font-size: 16px;
      font-weight: 700;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--text);
      transition: var(--transition);
      user-select: none;
      -webkit-tap-highlight-color: transparent;
    }

    .qty-btn:active {
      background: var(--accent-dim);
      border-color: var(--accent);
      color: var(--accent);
    }

    .qty-val {
      font-size: 13.5px;
      font-weight: 700;
      min-width: 22px;
      text-align: center;
    }

    .cart-footer {
      padding: 14px 18px;
      border-top: 1px solid var(--border);
      flex-shrink: 0;
      background: var(--bg-2);
    }

    .customer-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      margin-bottom: 12px;
    }

    .cart-summary-row {
      display: flex;
      justify-content: space-between;
      font-size: 13px;
      margin-bottom: 6px;
      color: var(--text-2);
    }

    .cart-summary-row.total {
      font-size: 16px;
      font-weight: 700;
      color: var(--text);
      margin-top: 10px;
      margin-bottom: 14px;
      padding-top: 10px;
      border-top: 1px solid var(--border);
    }

    .cart-summary-row.total span:last-child {
      color: var(--accent);
    }

    /* ── Item Modal with options ── */
    .item-modal-icon {
      width: 64px;
      height: 64px;
      background: var(--bg-3);
      border-radius: var(--radius);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 32px;
      margin: 0 auto 14px;
    }

    .item-modal-name {
      font-family: var(--font-head);
      font-size: 19px;
      font-weight: 700;
      letter-spacing: -0.2px;
    }

    .item-modal-price {
      font-size: 14px;
      color: var(--accent);
      margin-top: 4px;
      margin-bottom: 20px;
      font-weight: 600;
    }

    .qty-big-ctrl {
      display: flex;
      align-items: center;
      gap: 16px;
      margin-bottom: 20px;
    }

    .qty-big-btn {
      width: 44px;
      height: 44px;
      background: var(--bg-3);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      cursor: pointer;
      font-size: 22px;
      font-weight: 700;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--text);
      transition: var(--transition);
      -webkit-tap-highlight-color: transparent;
    }

    .qty-big-btn:active {
      background: var(--accent-dim);
      border-color: var(--accent);
      color: var(--accent);
    }

    .qty-big-val {
      font-size: 30px;
      font-weight: 800;
      font-family: var(--font-head);
      min-width: 42px;
      text-align: center;
    }

    /* Option pill groups */
    .option-section {
      margin-bottom: 16px;
      text-align: left;
    }

    .option-section-label {
      font-size: 11.5px;
      font-weight: 600;
      color: var(--text-3);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 8px;
    }

    .option-pills {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
    }

    .option-pill {
      padding: 7px 14px;
      border-radius: 20px;
      border: 1px solid var(--border);
      background: var(--bg-3);
      font-size: 13px;
      font-weight: 500;
      color: var(--text-2);
      cursor: pointer;
      transition: var(--transition);
      -webkit-tap-highlight-color: transparent;
      user-select: none;
    }

    .option-pill.selected {
      background: var(--accent);
      color: #fff;
      border-color: var(--accent);
      box-shadow: 0 2px 8px rgba(59, 91, 252, 0.25);
    }

    .option-pill:active {
      transform: scale(0.96);
    }

    /* ── Checkout Modal ── */
    .checkout-section {
      margin-bottom: 16px;
    }

    .checkout-section-title {
      font-size: 11px;
      font-weight: 700;
      color: var(--text-3);
      text-transform: uppercase;
      letter-spacing: 0.6px;
      margin-bottom: 8px;
    }

    .confirm-line {
      display: flex;
      justify-content: space-between;
      padding: 7px 0;
      border-bottom: 1px solid var(--border);
      font-size: 13px;
      color: var(--text-2);
    }

    .confirm-line:last-child {
      border-bottom: none;
    }

    .confirm-line span:last-child {
      font-weight: 600;
      color: var(--text);
    }

    .checkout-total-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 12px 0;
      margin: 4px 0;
      border-top: 2px solid var(--border);
      font-size: 17px;
      font-weight: 700;
    }

    .checkout-total-row span:last-child {
      font-family: var(--font-head);
      color: var(--accent);
      font-size: 20px;
    }

    .payment-pills {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .payment-pill-btn {
      flex: 1;
      min-width: 72px;
      padding: 9px 12px;
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      background: var(--bg-3);
      color: var(--text-2);
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      text-align: center;
      transition: var(--transition);
      -webkit-tap-highlight-color: transparent;
    }

    .payment-pill-btn.active {
      background: var(--accent);
      color: #fff;
      border-color: var(--accent);
      box-shadow: 0 2px 8px rgba(59, 91, 252, 0.28);
    }

    /* ══════════════════════════════════════
       DESKTOP ≥ 768px
    ══════════════════════════════════════ */
    @media (min-width: 768px) {
      .home-body {
        display: grid;
        grid-template-columns: 1fr 340px;
        height: calc(100vh - 57px);
        flex-direction: unset;
      }

      .pos-main {
        border-right: 1px solid var(--border);
      }

      .category-tabs {
        padding: 0 24px;
      }

      .cat-tab {
        padding: 12px 18px;
      }

      .menu-grid-wrap {
        padding: 20px 24px;
      }

      .menu-grid {
        grid-template-columns: repeat(auto-fill, minmax(148px, 1fr));
        gap: 12px;
      }

      .menu-card:hover {
        border-color: var(--accent);
        box-shadow: 0 4px 16px rgba(59, 91, 252, 0.1);
      }

      .menu-card:active {
        transform: none;
      }

      .cart-fab {
        display: none !important;
      }

      .cart-drawer-overlay {
        display: none !important;
      }

      .cart-panel {
        position: static;
        transform: none !important;
        border-radius: 0;
        border: none;
        bottom: unset;
        max-height: unset;
        height: 100%;
        box-shadow: none;
      }

      .cart-drag-handle {
        display: none;
      }

      .cart-header {
        padding: 16px 20px 12px;
      }

      .cart-items {
        padding: 10px 20px;
      }

      .cart-footer {
        padding: 14px 20px;
      }

      .qty-btn {
        width: 24px;
        height: 24px;
        font-size: 14px;
      }
    }

    @media (min-width: 1200px) {
      .home-body {
        grid-template-columns: 1fr 360px;
      }

      .menu-grid {
        grid-template-columns: repeat(auto-fill, minmax(158px, 1fr));
      }
    }
  </style>
</head>

  <script>
    var allMenus = [];
    var cart = [];
    var taxRate = 0;
    var cashier = 'Kasir';
    var selectedMenu = null;
    var currentTab = 'all';
    var isMobile = false;
    var selectedPayment = 'Cash';
    var selectedOptions = {}; // { "Suhu": "Panas", "Size": "Regular" }

    var PAYMENT_OPTIONS = ['Cash', 'QRIS', 'Transfer'];

    window.addEventListener('load', function () {
      checkMobile();
      window.addEventListener('resize', checkMobile);
      document.getElementById('headerDate').textContent = new Date().toLocaleDateString('id-ID', {
        weekday: 'long', day: 'numeric', month: 'long', year: 'numeric'
      });
      loadSettings();
      loadMenus();
    });

    function checkMobile() {
      isMobile = window.innerWidth < 768;
      document.getElementById('cartCloseBtn').style.display = isMobile ? 'inline-flex' : 'none';
      if (!isMobile) {
        document.getElementById('cartPanel').classList.remove('open');
        document.getElementById('cartDrawerOverlay').classList.remove('open');
      }
      updateFab();
    }

    function openCartDrawer() { document.getElementById('cartPanel').classList.add('open'); document.getElementById('cartDrawerOverlay').classList.add('open'); }
    function closeCartDrawer() { document.getElementById('cartPanel').classList.remove('open'); document.getElementById('cartDrawerOverlay').classList.remove('open'); }

    function renderPaymentPills() {
      document.getElementById('paymentPills').innerHTML = PAYMENT_OPTIONS.map(function (p) {
        return '<div class="payment-pill-btn ' + (p === selectedPayment ? 'active' : '') + '" onclick="selectPayment(\'' + p + '\')">' + p + '</div>';
      }).join('');
    }
    function selectPayment(method) { selectedPayment = method; renderPaymentPills(); }

    function loadSettings() {
      gasCall('apiGetSettings').then(function (s) {
        taxRate = Number(s.tax_rate || 0);
        cashier = s.cashier_name || 'Kasir';
        if (taxRate > 0) document.getElementById('taxRow').style.display = 'flex';
        document.getElementById('taxPct').textContent = taxRate;
      });
    }

    function loadMenus() {
      gasCall('apiGetAvailableMenus').then(function (menus) {
        allMenus = menus;
        renderMenuGrid(currentTab);
      }).catch(function () { Toast.error('Gagal memuat menu'); });
    }

    var CAT_EMOJI = { Coffee: '☕', 'No Coffee': '🥤', Snack: '🍩' };
    function menuEmoji(cat) { return CAT_EMOJI[cat] || '🍽️'; }

    function renderMenuGrid(tab) {
      var grid = document.getElementById('menuGrid');
      var items = tab === 'all' ? allMenus : allMenus.filter(function (m) { return m.category === tab; });
      if (!items.length) {
        grid.innerHTML = '<div class="empty-state" style="grid-column:1/-1"><span class="empty-icon">🍽️</span><p>Tidak ada menu</p></div>';
        return;
      }
      grid.innerHTML = items.map(function (m) {
        var inCart = cart.find(function (c) { return c.menuId === m.id; });
        return '<div class="menu-card ' + (m.isAvailable ? '' : 'unavailable') + '" onclick="' + (m.isAvailable ? 'openItemModal(\'' + m.id + '\')' : '') + '">' +
          (inCart ? '<div class="menu-card-badge">' + inCart.qty + '</div>' : '') +
          '<div class="menu-card-icon">' + menuEmoji(m.category) + '</div>' +
          '<div class="menu-card-cat">' + m.category + '</div>' +
          '<div class="menu-card-name">' + m.name + '</div>' +
          '<div class="menu-card-price">' + formatIDR(m.price) + '</div>' +
          '</div>';
      }).join('');
    }

    function switchTab(tab, el) {
      currentTab = tab;
      document.querySelectorAll('.cat-tab').forEach(function (t) { t.classList.remove('active'); });
      el.classList.add('active');
      renderMenuGrid(tab);
    }

    /* ══════════════════════════════════════
       ITEM MODAL WITH OPTIONS
    ══════════════════════════════════════ */

    function openItemModal(menuId) {
      var m = allMenus.find(function (x) { return x.id === menuId; });
      if (!m) return;
      selectedMenu = m;
      selectedOptions = {};

      document.getElementById('modalIcon').textContent = menuEmoji(m.category);
      document.getElementById('modalName').textContent = m.name;
      document.getElementById('modalPrice').textContent = formatIDR(m.price);
      document.getElementById('modalNotes').value = '';

      var existing = cart.find(function (c) { return c.menuId === m.id; });
      document.getElementById('modalQty').textContent = existing ? existing.qty : 1;

      // Restore previous option selections if item already in cart
      if (existing && existing.selectedOptions) {
        selectedOptions = JSON.parse(JSON.stringify(existing.selectedOptions));
      } else {
        // Set defaults
        (m.options || []).forEach(function (g) {
          if (g.default) selectedOptions[g.name] = g.default;
          else if (g.values && g.values.length) selectedOptions[g.name] = g.values[0];
        });
      }

      renderModalOptions(m.options || []);
      openModal('itemModal');
    }

    function renderModalOptions(options) {
      var container = document.getElementById('modalOptions');
      if (!options || !options.length) { container.innerHTML = ''; return; }
      container.innerHTML = options.map(function (g) {
        var pills = g.values.map(function (v) {
          var isSelected = selectedOptions[g.name] === v;
          return '<div class="option-pill ' + (isSelected ? 'selected' : '') + '" ' +
            'onclick="selectOption(\'' + g.name + '\',\'' + v + '\')">' + v + '</div>';
        }).join('');
        return '<div class="option-section">' +
          '<div class="option-section-label">' + g.name + '</div>' +
          '<div class="option-pills" id="pills_' + g.name.replace(/\s/g, '_') + '">' + pills + '</div>' +
          '</div>';
      }).join('');
    }

    function selectOption(groupName, value) {
      selectedOptions[groupName] = value;
      // Re-render just the pills for this group
      var safeId = 'pills_' + groupName.replace(/\s/g, '_');
      var container = document.getElementById(safeId);
      if (!container) return;
      var group = selectedMenu.options.find(function (g) { return g.name === groupName; });
      if (!group) return;
      container.innerHTML = group.values.map(function (v) {
        return '<div class="option-pill ' + (selectedOptions[groupName] === v ? 'selected' : '') + '" ' +
          'onclick="selectOption(\'' + groupName + '\',\'' + v + '\')">' + v + '</div>';
      }).join('');
    }

    function modalQtyChange(delta) {
      var el = document.getElementById('modalQty');
      el.textContent = Math.max(1, Number(el.textContent) + delta);
    }

    function addToCart() {
      if (!selectedMenu) return;
      var qty = Number(document.getElementById('modalQty').textContent);
      var notes = document.getElementById('modalNotes').value.trim();

      // Build notes string from options + manual notes
      var optParts = [];
      Object.keys(selectedOptions).forEach(function (k) {
        if (selectedOptions[k]) optParts.push(selectedOptions[k]);
      });
      if (notes) optParts.push(notes);
      var fullNotes = optParts.join(' · ');

      var existing = cart.find(function (c) { return c.menuId === selectedMenu.id; });
      if (existing) {
        existing.qty = qty;
        existing.notes = fullNotes;
        existing.selectedOptions = JSON.parse(JSON.stringify(selectedOptions));
      } else {
        cart.push({
          menuId: selectedMenu.id,
          menuName: selectedMenu.name,
          qty: qty,
          unitPrice: selectedMenu.price,
          notes: fullNotes,
          selectedOptions: JSON.parse(JSON.stringify(selectedOptions)),
          emoji: menuEmoji(selectedMenu.category),
        });
      }
      closeModal('itemModal');
      renderCart(); renderMenuGrid(currentTab);
      Toast.success(selectedMenu.name + ' ditambahkan');
    }

    /* ── FAB ── */
    function updateFab() {
      var fab = document.getElementById('cartFab');
      var count = document.getElementById('cartFabCount');
      var total = cart.reduce(function (s, i) { return s + i.qty; }, 0);
      count.textContent = total;
      fab.style.display = (isMobile && total > 0) ? 'flex' : 'none';
    }

    /* ── Cart ── */
    function renderCart() {
      var el = document.getElementById('cartItems');
      if (!cart.length) {
        el.innerHTML = '<div class="empty-state"><span class="empty-icon">🛒</span><p>Pilih menu untuk mulai</p></div>';
        document.getElementById('checkoutBtn').disabled = true;
        updateTotals(); updateFab(); return;
      }
      el.innerHTML = cart.map(function (item, idx) {
        return '<div class="cart-item">' +
          '<div class="cart-item-icon">' + item.emoji + '</div>' +
          '<div class="cart-item-info">' +
          '<div class="cart-item-name">' + item.menuName + '</div>' +
          (item.notes ? '<div class="cart-item-price">' + item.notes + '</div>' : '') +
          '<div class="qty-ctrl">' +
          '<div class="qty-btn" onclick="cartQty(' + idx + ',-1)">−</div>' +
          '<div class="qty-val">' + item.qty + '</div>' +
          '<div class="qty-btn" onclick="cartQty(' + idx + ',1)">+</div>' +
          '</div>' +
          '</div>' +
          '<div style="display:flex;flex-direction:column;align-items:flex-end;gap:8px">' +
          '<div class="cart-item-subtotal">' + formatIDR(item.unitPrice * item.qty) + '</div>' +
          '<button class="btn btn-danger btn-sm" onclick="removeFromCart(' + idx + ')">✕</button>' +
          '</div>' +
          '</div>';
      }).join('');
      document.getElementById('checkoutBtn').disabled = false;
      updateTotals(); updateFab();
    }

    function cartQty(idx, delta) { cart[idx].qty = Math.max(1, cart[idx].qty + delta); renderCart(); renderMenuGrid(currentTab); }
    function removeFromCart(idx) { cart.splice(idx, 1); renderCart(); renderMenuGrid(currentTab); }
    function clearCart() {
      cart = [];
      document.getElementById('customerName').value = '';
      document.getElementById('tableNumber').value = '';
      renderCart(); renderMenuGrid(currentTab);
      if (isMobile) closeCartDrawer();
    }
    function updateTotals() {
      var sub = cart.reduce(function (s, i) { return s + i.unitPrice * i.qty; }, 0);
      var tax = sub * (taxRate / 100);
      document.getElementById('cartSubtotal').textContent = formatIDR(sub);
      document.getElementById('cartTax').textContent = formatIDR(tax);
      document.getElementById('cartTotal').textContent = formatIDR(sub + tax);
    }

    /* ── Checkout ── */
    function checkout() {
      if (!cart.length) return;
      var customerName = document.getElementById('customerName').value.trim();
      var tableNumber = document.getElementById('tableNumber').value.trim();
      var customerLabel = [customerName, tableNumber].filter(Boolean).join(' · ');
      var infoEl = document.getElementById('checkoutCustomerInfo');
      if (customerLabel) { document.getElementById('checkoutCustomerLabel').textContent = customerLabel; infoEl.style.display = 'block'; }
      else infoEl.style.display = 'none';
      var sub = cart.reduce(function (s, i) { return s + i.unitPrice * i.qty; }, 0);
      var tax = sub * (taxRate / 100);
      document.getElementById('checkoutItems').innerHTML = cart.map(function (i) {
        return '<div class="confirm-line">' +
          '<span>' + i.qty + '× ' + i.menuName + (i.notes ? ' <span style="color:var(--text-3)">(' + i.notes + ')</span>' : '') + '</span>' +
          '<span>' + formatIDR(i.unitPrice * i.qty) + '</span>' +
          '</div>';
      }).join('');
      document.getElementById('checkoutTotal').textContent = formatIDR(sub + tax);
      document.getElementById('orderNotes').value = '';
      selectedPayment = 'Cash';
      renderPaymentPills();
      if (isMobile) closeCartDrawer();
      openModal('checkoutModal');
    }

    function submitOrder() {
      var customerName = document.getElementById('customerName').value.trim();
      var tableNumber = document.getElementById('tableNumber').value.trim();
      var customerLabel = [customerName, tableNumber].filter(Boolean).join(' · ');
      var payload = {
        items: cart.map(function (i) { return { menuId: i.menuId, menuName: i.menuName, qty: i.qty, unitPrice: i.unitPrice }; }),
        paymentMethod: selectedPayment,
        notes: document.getElementById('orderNotes').value.trim(),
        cashierName: cashier,
        customerName: customerLabel,
      };
      closeModal('checkoutModal');
      Loader.show();
      gasCall('apiCreateOrder', JSON.stringify(payload)).then(function (res) {
        Loader.hide();
        if (res.success) {
          var label = customerLabel ? ' untuk ' + customerLabel : '';
          Toast.success('Pesanan' + label + ' berhasil dibuat!');
          clearCart();
        } else Toast.error('Gagal: ' + res.error);
      }).catch(function () { Loader.hide(); Toast.error('Terjadi kesalahan'); });
    }
  </script>
</body>

</html>
