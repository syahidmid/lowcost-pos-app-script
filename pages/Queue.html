<!DOCTYPE html>
<html>

<head>
    <base target="_top">
    <?!= include('components/Styles') ?>
    <style>
        .queue-body {
            flex: 1;
            overflow-y: auto;
            padding: 16px;
            -webkit-overflow-scrolling: touch;
            padding-bottom: calc(var(--bottom-nav-h) + 24px);
        }

        .filter-tabs {
            display: flex;
            gap: 8px;
            margin-bottom: 16px;
            flex-wrap: wrap;
        }

        .filter-tab {
            padding: 7px 14px;
            border-radius: 20px;
            font-size: 12.5px;
            font-weight: 600;
            border: 1px solid var(--border);
            background: var(--bg-2);
            color: var(--text-2);
            cursor: pointer;
            transition: var(--transition);
            -webkit-tap-highlight-color: transparent;
        }

        .filter-tab.active {
            background: var(--accent);
            color: #fff;
            border-color: var(--accent);
        }

        .filter-tab:active {
            transform: scale(0.97);
        }

        .queue-grid {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .queue-stats {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            margin-bottom: 16px;
        }

        .stat-card {
            background: var(--bg-2);
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            padding: 12px;
            text-align: center;
            box-shadow: var(--shadow-sm);
        }

        .stat-num {
            font-family: var(--font-head);
            font-size: 22px;
            font-weight: 800;
            color: var(--text);
            line-height: 1;
        }

        .stat-label {
            font-size: 10.5px;
            color: var(--text-3);
            margin-top: 4px;
            text-transform: uppercase;
            letter-spacing: 0.4px;
            font-weight: 600;
        }

        .queue-empty {
            text-align: center;
            padding: 60px 24px;
            color: var(--text-3);
        }

        .queue-empty-icon {
            font-size: 48px;
            display: block;
            margin-bottom: 12px;
            opacity: 0.3;
        }

        .queue-empty-title {
            font-family: var(--font-head);
            font-size: 16px;
            font-weight: 700;
            color: var(--text-2);
            margin-bottom: 6px;
        }

        .queue-empty-sub {
            font-size: 13px;
        }

        @media (min-width: 768px) {
            .queue-body {
                padding: 24px 28px;
            }

            .queue-grid {
                display: grid;
                grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
                gap: 12px;
            }

            .queue-stats {
                grid-template-columns: repeat(3, 180px);
            }
        }
    </style>
</head>

<body>
    <div class="app-shell">
        <?!= include('components/Sidebar') ?>

        <div class="main-content">
            <div class="page-header">
                <div class="flex items-center justify-between" style="padding-bottom:14px">
                    <div>
                        <div class="page-title">Antrian</div>
                        <div class="page-subtitle" id="lastRefresh">Memuat...</div>
                    </div>
                    <button class="btn btn-ghost btn-sm" onclick="loadQueue()">↻ Refresh</button>
                </div>
            </div>

            <div class="queue-body">
                <div class="queue-stats">
                    <div class="stat-card">
                        <div class="stat-num" id="statPending">—</div>
                        <div class="stat-label">Pending</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-num" id="statPreparing">—</div>
                        <div class="stat-label">Diproses</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-num" id="statTotal">—</div>
                        <div class="stat-label">Total Aktif</div>
                    </div>
                </div>

                <div class="filter-tabs">
                    <div class="filter-tab active" onclick="setFilter('all',this)">Semua</div>
                    <div class="filter-tab" onclick="setFilter('pending',this)">Pending</div>
                    <div class="filter-tab" onclick="setFilter('preparing',this)">Diproses</div>
                </div>

                <div class="queue-grid" id="queueGrid">
                    <div class="queue-empty">
                        <div class="spinner"></div>
                        <p style="margin-top:12px">Memuat antrian...</p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <?!= include('components/Scripts') ?>
    <?!= include('components/OrderCard') ?>
    <script>
        var allOrders = [];
        var allMenus = []; // needed by OrderCard edit modal
        var activeFilter = 'all';

        window.addEventListener('load', function () {
            loadQueue();
            // Load menus for edit modal
            gasCall('apiGetAvailableMenus').then(function (menus) { allMenus = menus; });
            setInterval(loadQueue, 20000);
        });

        function loadQueue() {
            gasCall('apiGetActiveOrders').then(function (orders) {
                allOrders = orders;
                renderStats();
                renderQueue();
                document.getElementById('lastRefresh').textContent =
                    'Update: ' + new Date().toLocaleTimeString('id-ID', { hour: '2-digit', minute: '2-digit' });
            }).catch(function () { Toast.error('Gagal memuat antrian'); });
        }

        function renderStats() {
            var pending = allOrders.filter(function (o) { return o.status === 'pending'; }).length;
            var preparing = allOrders.filter(function (o) { return o.status === 'preparing'; }).length;
            document.getElementById('statPending').textContent = pending;
            document.getElementById('statPreparing').textContent = preparing;
            document.getElementById('statTotal').textContent = allOrders.length;
        }

        function setFilter(filter, el) {
            activeFilter = filter;
            document.querySelectorAll('.filter-tab').forEach(function (t) { t.classList.remove('active'); });
            el.classList.add('active');
            renderQueue();
        }

        function renderQueue() {
            var grid = document.getElementById('queueGrid');
            var filtered = activeFilter === 'all'
                ? allOrders
                : allOrders.filter(function (o) { return o.status === activeFilter; });

            if (!filtered.length) {
                grid.innerHTML =
                    '<div class="queue-empty" style="grid-column:1/-1">' +
                    '<span class="queue-empty-icon">🎉</span>' +
                    '<div class="queue-empty-title">Semua beres!</div>' +
                    '<div class="queue-empty-sub">Tidak ada pesanan aktif</div>' +
                    '</div>';
                return;
            }

            // Use shared renderOrderCard from OrderCard component
            grid.innerHTML = filtered.map(function (o) {
                return renderOrderCard(o, 'updateOrderStatusAndRefresh', 'openEditOrder');
            }).join('');
        }

        // Wrapper — call shared updateOrderStatus then reload
        function updateOrderStatusAndRefresh(orderId, status) {
            updateOrderStatus(orderId, status, loadQueue);
        }
    </script>
</body>

</html>
