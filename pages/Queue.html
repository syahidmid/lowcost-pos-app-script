<!DOCTYPE html>
<html>

<head>
    <base target="_top">
    <?!= include('components/Styles') ?>
    <style>
        .queue-body {
            flex: 1;
            overflow-y: auto;
            padding: 16px;
            -webkit-overflow-scrolling: touch;
        }

        .filter-tabs {
            display: flex;
            gap: 8px;
            margin-bottom: 16px;
            flex-wrap: wrap;
        }

        .filter-tab {
            padding: 7px 14px;
            border-radius: 20px;
            font-size: 12.5px;
            font-weight: 600;
            border: 1px solid var(--border);
            background: var(--bg-2);
            color: var(--text-2);
            cursor: pointer;
            transition: var(--transition);
            -webkit-tap-highlight-color: transparent;
        }

        .filter-tab.active {
            background: var(--accent);
            color: #fff;
            border-color: var(--accent);
        }

        .filter-tab:active {
            transform: scale(0.97);
        }

        .queue-grid {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .qcard {
            background: var(--bg-2);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 14px 16px;
            box-shadow: var(--shadow-sm);
        }

        .qcard.status-pending {
            border-left: 3px solid var(--blue);
        }

        .qcard.status-preparing {
            border-left: 3px solid var(--amber);
        }

        .qcard-top {
            display: flex;
            align-items: flex-start;
            justify-content: space-between;
            margin-bottom: 8px;
        }

        .qcard-id {
            font-size: 11px;
            color: var(--text-3);
            font-weight: 500;
            margin-bottom: 2px;
        }

        .qcard-customer {
            font-family: var(--font-head);
            font-size: 15px;
            font-weight: 700;
            color: var(--text);
        }

        .qcard-time {
            font-size: 11px;
            color: var(--text-3);
            white-space: nowrap;
            margin-top: 4px;
        }

        .qcard-items {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            margin-bottom: 12px;
        }

        .qcard-item-chip {
            background: var(--bg-3);
            border: 1px solid var(--border);
            border-radius: var(--radius-xs);
            padding: 4px 8px;
            font-size: 12px;
            color: var(--text-2);
            font-weight: 500;
        }

        .qcard-item-desc {
            font-size: 11px;
            color: var(--accent);
            margin-top: 2px;
            font-weight: 500;
        }

        .qcard-item-chip strong {
            color: var(--text);
            font-weight: 700;
        }

        .qcard-footer {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 8px;
        }

        .qcard-total {
            font-size: 13px;
            font-weight: 700;
            color: var(--text);
        }

        .qcard-actions {
            display: flex;
            gap: 6px;
        }

        .queue-stats {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            margin-bottom: 16px;
        }

        .stat-card {
            background: var(--bg-2);
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            padding: 12px;
            text-align: center;
            box-shadow: var(--shadow-sm);
        }

        .stat-num {
            font-family: var(--font-head);
            font-size: 22px;
            font-weight: 800;
            color: var(--text);
            line-height: 1;
        }

        .stat-label {
            font-size: 10.5px;
            color: var(--text-3);
            margin-top: 4px;
            text-transform: uppercase;
            letter-spacing: 0.4px;
            font-weight: 600;
        }

        .queue-empty {
            text-align: center;
            padding: 60px 24px;
            color: var(--text-3);
        }

        .queue-empty-icon {
            font-size: 48px;
            display: block;
            margin-bottom: 12px;
            opacity: 0.3;
        }

        .queue-empty-title {
            font-family: var(--font-head);
            font-size: 16px;
            font-weight: 700;
            color: var(--text-2);
            margin-bottom: 6px;
        }

        .queue-empty-sub {
            font-size: 13px;
        }

        @media (min-width: 768px) {
            .queue-body {
                padding: 24px 28px;
            }

            .queue-grid {
                display: grid;
                grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
                gap: 12px;
            }

            .queue-stats {
                grid-template-columns: repeat(3, 180px);
            }
        }
    </style>
</head>

<body>
    <div class="app-shell">
        <?!= include('components/Sidebar') ?>

        <div class="main-content">
            <div class="page-header">
                <div class="flex items-center justify-between" style="padding-bottom:14px">
                    <div>
                        <div class="page-title">Antrian</div>
                        <div class="page-subtitle" id="lastRefresh">Memuat...</div>
                    </div>
                    <button class="btn btn-ghost btn-sm" onclick="loadQueue()">↻ Refresh</button>
                </div>
            </div>

            <div class="queue-body">

                <div class="queue-stats">
                    <div class="stat-card">
                        <div class="stat-num" id="statPending">—</div>
                        <div class="stat-label">Pending</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-num" id="statPreparing">—</div>
                        <div class="stat-label">Diproses</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-num" id="statTotal">—</div>
                        <div class="stat-label">Total Aktif</div>
                    </div>
                </div>

                <div class="filter-tabs">
                    <div class="filter-tab active" onclick="setFilter('all',this)">Semua</div>
                    <div class="filter-tab" onclick="setFilter('pending',this)">Pending</div>
                    <div class="filter-tab" onclick="setFilter('preparing',this)">Diproses</div>
                </div>

                <div class="queue-grid" id="queueGrid">
                    <div class="queue-empty">
                        <div class="spinner"></div>
                        <p style="margin-top:12px">Memuat antrian...</p>
                    </div>
                </div>
                <!-- spacer: push content above bottom nav on mobile -->
                <div class="mobile-spacer"></div>

            </div>
        </div>
    </div>

    <?!= include('components/Scripts') ?>
    <script>
        var allOrders = [];
        var activeFilter = 'all';

        window.addEventListener('load', function () {
            loadQueue();
            setInterval(loadQueue, 20000);
        });

        function loadQueue() {
            gasCall('apiGetActiveOrders').then(function (orders) {
                allOrders = orders;
                renderStats();
                renderQueue();
                document.getElementById('lastRefresh').textContent =
                    'Update: ' + new Date().toLocaleTimeString('id-ID', { hour: '2-digit', minute: '2-digit' });
            }).catch(function () { Toast.error('Gagal memuat antrian'); });
        }

        function renderStats() {
            var pending = allOrders.filter(function (o) { return o.status === 'pending'; }).length;
            var preparing = allOrders.filter(function (o) { return o.status === 'preparing'; }).length;
            document.getElementById('statPending').textContent = pending;
            document.getElementById('statPreparing').textContent = preparing;
            document.getElementById('statTotal').textContent = allOrders.length;
        }

        function setFilter(filter, el) {
            activeFilter = filter;
            document.querySelectorAll('.filter-tab').forEach(function (t) { t.classList.remove('active'); });
            el.classList.add('active');
            renderQueue();
        }

        function renderQueue() {
            var grid = document.getElementById('queueGrid');
            var filtered = activeFilter === 'all'
                ? allOrders
                : allOrders.filter(function (o) { return o.status === activeFilter; });

            if (!filtered.length) {
                grid.innerHTML =
                    '<div class="queue-empty" style="grid-column:1/-1">' +
                    '<span class="queue-empty-icon">🎉</span>' +
                    '<div class="queue-empty-title">Semua beres!</div>' +
                    '<div class="queue-empty-sub">Tidak ada pesanan aktif</div>' +
                    '</div>';
                return;
            }

            grid.innerHTML = filtered.map(function (o) {
                var customer = o.customerName ||
                    '<span style="color:var(--text-3);font-weight:400;font-size:12px">Tanpa nama</span>';
                var timeAgo = getTimeAgo(o.createdAt);
                var chips = o.items.map(function (i) {
                    var descStr = '';
                    if (i.description) {
                        try {
                            var d = JSON.parse(i.description);
                            var parts = [];
                            if (d.options) Object.keys(d.options).forEach(function (k) { if (d.options[k]) parts.push(d.options[k]); });
                            if (d.notes) parts.push(d.notes);
                            if (parts.length) descStr = parts.join(' · ');
                        } catch (e) { }
                    }
                    return '<div class="qcard-item-chip">' +
                        '<strong>' + i.qty + '×</strong> ' + i.menuName +
                        (descStr ? '<div class="qcard-item-desc">' + descStr + '</div>' : '') +
                        '</div>';
                }).join('');
                var total = o.items.reduce(function (s, i) { return s + i.unitPrice * i.qty; }, 0);

                return '<div class="qcard status-' + o.status + '" id="qcard-' + o.orderId + '">' +
                    '<div class="qcard-top">' +
                    '<div>' +
                    '<div class="qcard-id">#' + (o.orderId.split('-')[1] || o.orderId) + '</div>' +
                    '<div class="qcard-customer">' + customer + '</div>' +
                    '</div>' +
                    '<div style="text-align:right">' +
                    statusBadge(o.status) +
                    '<div class="qcard-time">' + timeAgo + '</div>' +
                    '</div>' +
                    '</div>' +
                    '<div class="qcard-items">' + chips + '</div>' +
                    '<div class="qcard-footer">' +
                    '<div class="qcard-total">' + formatIDR(total) + '</div>' +
                    '<div class="qcard-actions">' +
                    (o.status === 'pending'
                        ? '<button class="btn btn-sm" style="background:var(--amber-bg);color:var(--amber);border:1px solid rgba(217,119,6,0.2)" onclick="updateStatus(\'' + o.orderId + '\',\'preparing\')">Proses</button>'
                        : '') +
                    (o.status === 'preparing'
                        ? '<button class="btn btn-success btn-sm" onclick="updateStatus(\'' + o.orderId + '\',\'done\')">Selesai</button>'
                        : '') +
                    '<button class="btn btn-danger btn-sm" onclick="confirmCancel(\'' + o.orderId + '\')">Batal</button>' +
                    '</div>' +
                    '</div>' +
                    '</div>';
            }).join('');
        }

        function updateStatus(orderId, status) {
            var card = document.getElementById('qcard-' + orderId);
            if (card) card.style.opacity = '0.5';
            gasCall('apiUpdateOrderStatus', orderId, status).then(function () {
                loadQueue();
                var labels = { preparing: 'Pesanan diproses', done: 'Pesanan selesai!' };
                Toast.success(labels[status] || 'Status diupdate');
            }).catch(function () {
                if (card) card.style.opacity = '1';
                Toast.error('Gagal update status');
            });
        }

        function confirmCancel(orderId) {
            if (confirm('Batalkan pesanan ini?')) {
                updateStatus(orderId, 'cancelled');
            }
        }

        function getTimeAgo(isoString) {
            if (!isoString) return '';
            var diff = Math.floor((Date.now() - new Date(isoString)) / 1000);
            if (diff < 60) return diff + 'd lalu';
            if (diff < 3600) return Math.floor(diff / 60) + 'm lalu';
            return Math.floor(diff / 3600) + 'j lalu';
        }
    </script>
</body>

</html>
