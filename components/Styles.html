<style>
  @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@500;600;700;800&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500&display=swap');

  :root {
    --bg: #F4F5F7;
    --bg-2: #FFFFFF;
    --bg-3: #ECEEF2;
    --bg-4: #E2E4EA;
    --border: #DDE0E8;
    --border-2: #C8CBDA;
    --accent: #3B5BFC;
    --accent-2: #2945E0;
    --accent-dim: rgba(59, 91, 252, 0.08);
    --accent-soft: rgba(59, 91, 252, 0.14);
    --text: #111318;
    --text-2: #5A5F72;
    --text-3: #9298AD;
    --green: #16A34A;
    --green-bg: rgba(22, 163, 74, 0.09);
    --red: #DC2626;
    --red-bg: rgba(220, 38, 38, 0.09);
    --amber: #D97706;
    --amber-bg: rgba(217, 119, 6, 0.09);
    --blue: #2563EB;
    --blue-bg: rgba(37, 99, 235, 0.09);
    --radius: 12px;
    --radius-sm: 8px;
    --radius-xs: 6px;
    --shadow-sm: 0 1px 3px rgba(0, 0, 0, 0.06), 0 1px 2px rgba(0, 0, 0, 0.04);
    --shadow: 0 4px 16px rgba(0, 0, 0, 0.08), 0 1px 4px rgba(0, 0, 0, 0.04);
    --shadow-lg: 0 12px 40px rgba(0, 0, 0, 0.12), 0 4px 12px rgba(0, 0, 0, 0.06);
    --font-head: 'Plus Jakarta Sans', sans-serif;
    --font-body: 'DM Sans', sans-serif;
    --sidebar-w: 228px;
    --transition: 0.18s cubic-bezier(0.4, 0, 0.2, 1);
    --bottom-nav-h: 62px;
  }

  *,
  *::before,
  *::after {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
  }

  html,
  body {
    height: 100%;
    background: var(--bg);
    color: var(--text);
    font-family: var(--font-body);
    font-size: 14px;
    line-height: 1.5;
    overflow: hidden;
    -webkit-font-smoothing: antialiased;
  }

  .app-shell {
    display: flex;
    height: 100vh;
    overflow: hidden;
  }

  /* ── Sidebar ── */
  .sidebar {
    width: var(--sidebar-w);
    background: var(--bg-2);
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    flex-shrink: 0;
    overflow: hidden;
  }

  .sidebar-logo {
    padding: 22px 20px 16px;
    border-bottom: 1px solid var(--border);
  }

  .logo-wordmark {
    font-family: var(--font-head);
    font-size: 19px;
    font-weight: 800;
    color: var(--text);
    letter-spacing: -0.4px;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .logo-dot {
    width: 8px;
    height: 8px;
    background: var(--accent);
    border-radius: 50%;
    display: inline-block;
    flex-shrink: 0;
  }

  .logo-sub {
    font-size: 10.5px;
    color: var(--text-3);
    margin-top: 3px;
    letter-spacing: 0.7px;
    text-transform: uppercase;
    font-weight: 500;
  }

  .sidebar-nav {
    flex: 1;
    padding: 10px 12px;
  }

  .nav-item {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 9px 12px;
    cursor: pointer;
    color: var(--text-2);
    font-size: 13.5px;
    font-weight: 500;
    border-radius: var(--radius-sm);
    transition: var(--transition);
    text-decoration: none;
    margin-bottom: 2px;
  }

  .nav-item:hover {
    color: var(--text);
    background: var(--bg-3);
  }

  .nav-item.active {
    color: var(--accent);
    background: var(--accent-dim);
    font-weight: 600;
  }

  .nav-icon {
    width: 32px;
    height: 32px;
    display: flex;
    align-items: center;
    justify-content: center;
    border-radius: var(--radius-xs);
    font-size: 15px;
    background: var(--bg-3);
    flex-shrink: 0;
    transition: var(--transition);
  }

  .nav-item.active .nav-icon {
    background: var(--accent-soft);
  }

  .sidebar-footer {
    padding: 12px 16px 18px;
    border-top: 1px solid var(--border);
  }

  .cashier-badge {
    background: var(--bg-3);
    border-radius: var(--radius-sm);
    padding: 10px 12px;
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .cashier-avatar {
    width: 30px;
    height: 30px;
    background: var(--accent-dim);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 12px;
    color: var(--accent);
    font-weight: 700;
    font-family: var(--font-head);
    flex-shrink: 0;
  }

  .cashier-name {
    font-size: 12.5px;
    font-weight: 600;
    color: var(--text);
  }

  .cashier-role {
    font-size: 11px;
    color: var(--text-3);
    margin-top: 1px;
  }

  /* ── Bottom Nav (mobile) ── */
  .bottom-nav {
    display: none;
    position: fixed;
    bottom: 0;
    left: 0;
    right: 0;
    height: var(--bottom-nav-h);
    background: var(--bg-2);
    border-top: 1px solid var(--border);
    z-index: 500;
    padding-bottom: env(safe-area-inset-bottom, 0px);
  }

  .bottom-nav-inner {
    display: flex;
    height: 62px;
    align-items: center;
    justify-content: space-around;
    padding: 0 4px;
  }

  .bottom-nav-item {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 3px;
    padding: 6px 10px;
    cursor: pointer;
    color: var(--text-3);
    font-size: 10px;
    font-weight: 600;
    text-decoration: none;
    text-transform: uppercase;
    letter-spacing: 0.4px;
    border-radius: var(--radius-sm);
    transition: var(--transition);
    -webkit-tap-highlight-color: transparent;
    min-width: 54px;
  }

  .bottom-nav-item .nav-icon {
    width: 28px;
    height: 28px;
    font-size: 16px;
    background: transparent;
  }

  .bottom-nav-item.active {
    color: var(--accent);
  }

  .bottom-nav-item.active .nav-icon {
    background: var(--accent-dim);
  }

  .bottom-nav-item:active {
    background: var(--bg-3);
  }

  /* ── Main Content ── */
  .main-content {
    flex: 1;
    overflow-y: auto;
    overflow-x: hidden;
    display: flex;
    flex-direction: column;
    min-width: 0;
    background: var(--bg);
  }

  .page-header {
    padding: 20px 28px 0;
    border-bottom: 1px solid var(--border);
    background: var(--bg-2);
    flex-shrink: 0;
  }

  .page-title {
    font-family: var(--font-head);
    font-size: 20px;
    font-weight: 700;
    color: var(--text);
    margin-bottom: 2px;
    letter-spacing: -0.3px;
  }

  .page-subtitle {
    font-size: 12.5px;
    color: var(--text-3);
    padding-bottom: 16px;
  }

  .page-body {
    flex: 1;
    padding: 24px 28px;
    overflow-y: auto;
  }

  /* ── Card ── */
  .card {
    background: var(--bg-2);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 20px;
    box-shadow: var(--shadow-sm);
  }

  .card-title {
    font-family: var(--font-head);
    font-size: 12.5px;
    font-weight: 700;
    color: var(--text);
    margin-bottom: 16px;
    text-transform: uppercase;
    letter-spacing: 0.6px;
  }

  /* ── Buttons ── */
  .btn {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 8px 16px;
    border-radius: var(--radius-sm);
    font-family: var(--font-body);
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    border: none;
    transition: var(--transition);
    white-space: nowrap;
    text-decoration: none;
    -webkit-tap-highlight-color: transparent;
  }

  .btn-primary {
    background: var(--accent);
    color: #fff;
    box-shadow: 0 2px 8px rgba(59, 91, 252, 0.28);
  }

  .btn-primary:hover {
    background: var(--accent-2);
    box-shadow: 0 4px 14px rgba(59, 91, 252, 0.34);
  }

  .btn-primary:active {
    transform: scale(0.98);
  }

  .btn-ghost {
    background: transparent;
    color: var(--text-2);
    border: 1px solid var(--border);
  }

  .btn-ghost:hover {
    background: var(--bg-3);
    color: var(--text);
    border-color: var(--border-2);
  }

  .btn-danger {
    background: var(--red-bg);
    color: var(--red);
    border: 1px solid rgba(220, 38, 38, 0.15);
  }

  .btn-danger:hover {
    background: rgba(220, 38, 38, 0.15);
  }

  .btn-success {
    background: var(--green-bg);
    color: var(--green);
    border: 1px solid rgba(22, 163, 74, 0.15);
  }

  .btn-success:hover {
    background: rgba(22, 163, 74, 0.15);
  }

  .btn-sm {
    padding: 5px 10px;
    font-size: 12px;
    border-radius: var(--radius-xs);
  }

  .btn-lg {
    padding: 13px 24px;
    font-size: 15px;
    font-weight: 700;
    border-radius: var(--radius);
  }

  .btn-block {
    width: 100%;
    justify-content: center;
  }

  .btn:disabled {
    opacity: 0.38;
    cursor: not-allowed;
    box-shadow: none;
    transform: none;
  }

  /* ── Forms ── */
  .form-group {
    margin-bottom: 14px;
  }

  .form-label {
    display: block;
    font-size: 11.5px;
    font-weight: 600;
    color: var(--text-3);
    margin-bottom: 6px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }

  .form-control {
    width: 100%;
    background: var(--bg-3);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    color: var(--text);
    font-family: var(--font-body);
    font-size: 14px;
    padding: 10px 12px;
    outline: none;
    transition: border-color var(--transition), background var(--transition), box-shadow var(--transition);
    -webkit-appearance: none;
  }

  .form-control:focus {
    border-color: var(--accent);
    background: var(--bg-2);
    box-shadow: 0 0 0 3px rgba(59, 91, 252, 0.1);
  }

  .form-control::placeholder {
    color: var(--text-3);
  }

  select.form-control {
    cursor: pointer;
  }

  /* ── Badges ── */
  .badge {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    padding: 3px 9px;
    border-radius: 20px;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.2px;
  }

  .badge-pending {
    background: var(--blue-bg);
    color: var(--blue);
  }

  .badge-preparing {
    background: var(--amber-bg);
    color: var(--amber);
  }

  .badge-done {
    background: var(--green-bg);
    color: var(--green);
  }

  .badge-cancelled {
    background: var(--red-bg);
    color: var(--red);
  }

  .badge-available {
    background: var(--green-bg);
    color: var(--green);
  }

  .badge-unavail {
    background: var(--red-bg);
    color: var(--red);
  }

  /* ── Modal ── */
  .modal-overlay {
    position: fixed;
    inset: 0;
    background: rgba(17, 19, 24, 0.45);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 1000;
    opacity: 0;
    pointer-events: none;
    transition: opacity var(--transition);
    backdrop-filter: blur(6px);
    padding: 16px;
  }

  .modal-overlay.open {
    opacity: 1;
    pointer-events: all;
  }

  .modal {
    background: var(--bg-2);
    border: 1px solid var(--border);
    border-radius: 18px;
    padding: 28px;
    width: 100%;
    max-width: 440px;
    max-height: 90vh;
    overflow-y: auto;
    transform: translateY(16px) scale(0.97);
    transition: transform var(--transition);
    box-shadow: var(--shadow-lg);
  }

  .modal-overlay.open .modal {
    transform: translateY(0) scale(1);
  }

  .modal-header {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    margin-bottom: 20px;
  }

  .modal-title {
    font-family: var(--font-head);
    font-size: 17px;
    font-weight: 700;
    letter-spacing: -0.2px;
  }

  .modal-close {
    background: var(--bg-3);
    border: none;
    color: var(--text-2);
    cursor: pointer;
    width: 30px;
    height: 30px;
    border-radius: 50%;
    font-size: 14px;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: var(--transition);
    flex-shrink: 0;
  }

  .modal-close:hover {
    background: var(--bg-4);
    color: var(--text);
  }

  /* ── Toast ── */
  .toast-container {
    position: fixed;
    bottom: 24px;
    right: 20px;
    display: flex;
    flex-direction: column;
    gap: 8px;
    z-index: 9999;
  }

  .toast {
    background: var(--text);
    border-radius: var(--radius-sm);
    padding: 12px 16px;
    font-size: 13px;
    color: #fff;
    box-shadow: var(--shadow-lg);
    display: flex;
    align-items: center;
    gap: 10px;
    animation: slideUp 0.22s ease;
    min-width: 240px;
    max-width: calc(100vw - 40px);
    font-weight: 500;
  }

  .toast.success {
    background: #0A1410;
    border-left: 3px solid var(--green);
  }

  .toast.error {
    background: #150B0B;
    border-left: 3px solid var(--red);
  }

  .toast.info {
    background: #0B0E1E;
    border-left: 3px solid var(--accent);
  }

  @keyframes slideUp {
    from {
      transform: translateY(10px);
      opacity: 0;
    }

    to {
      transform: translateY(0);
      opacity: 1;
    }
  }

  /* ── Spinner ── */
  .spinner {
    width: 20px;
    height: 20px;
    border: 2px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
    display: inline-block;
  }

  @keyframes spin {
    to {
      transform: rotate(360deg);
    }
  }

  .loading-overlay {
    position: fixed;
    inset: 0;
    background: rgba(244, 245, 247, 0.82);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 5000;
    backdrop-filter: blur(4px);
  }

  /* ── Scrollbar ── */
  ::-webkit-scrollbar {
    width: 5px;
    height: 5px;
  }

  ::-webkit-scrollbar-track {
    background: transparent;
  }

  ::-webkit-scrollbar-thumb {
    background: var(--border);
    border-radius: 3px;
  }

  ::-webkit-scrollbar-thumb:hover {
    background: var(--border-2);
  }

  /* ── Utilities ── */
  .divider {
    border: none;
    border-top: 1px solid var(--border);
    margin: 16px 0;
  }

  .empty-state {
    text-align: center;
    padding: 36px 20px;
    color: var(--text-3);
  }

  .empty-state .empty-icon {
    font-size: 32px;
    display: block;
    margin-bottom: 10px;
    opacity: 0.4;
  }

  .empty-state p {
    font-size: 13px;
  }

  .text-accent {
    color: var(--accent);
  }

  .text-muted {
    color: var(--text-2);
  }

  .text-green {
    color: var(--green);
  }

  .text-red {
    color: var(--red);
  }

  .text-right {
    text-align: right;
  }

  .mt-8 {
    margin-top: 8px;
  }

  .mt-16 {
    margin-top: 16px;
  }

  .flex {
    display: flex;
  }

  .flex-1 {
    flex: 1;
  }

  .items-center {
    align-items: center;
  }

  .justify-between {
    justify-content: space-between;
  }

  .gap-8 {
    gap: 8px;
  }

  .gap-12 {
    gap: 12px;
  }

  .w-full {
    width: 100%;
  }

  .hidden {
    display: none !important;
  }

  /* ══════════════════════════════════════
     MOBILE ≤ 767px
  ══════════════════════════════════════ */
  @media (max-width: 767px) {
    .sidebar {
      display: none;
    }

    .bottom-nav {
      display: flex;
    }

    .main-content {
      padding-bottom: var(--bottom-nav-h);
    }

    .page-header {
      padding: 14px 16px 0;
    }

    .page-title {
      font-size: 17px;
    }

    .page-body {
      padding: 14px 16px;
    }

    .toast-container {
      bottom: calc(var(--bottom-nav-h) + 10px);
      right: 12px;
    }

    .modal-overlay {
      align-items: flex-end;
      padding: 0;
    }

    .modal {
      width: 100%;
      max-width: 100%;
      padding: 20px 20px 28px;
      border-radius: 20px 20px 0 0;
      max-height: 92vh;
      transform: translateY(100%);
    }

    .modal-overlay.open .modal {
      transform: translateY(0);
    }
  }
</style>
