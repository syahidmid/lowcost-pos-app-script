<style>
  /* ── Google Fonts ── */
  @import url('https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap');

  /* ── CSS Variables ── */
  :root {
    --bg:         #0f0f13;
    --bg-2:       #18181f;
    --bg-3:       #22222d;
    --border:     #2e2e3d;
    --accent:     #e8a838;
    --accent-2:   #c47f15;
    --accent-dim: rgba(232,168,56,0.12);
    --text:       #f0ede8;
    --text-2:     #9a9097;
    --text-3:     #5c5660;
    --green:      #3ecf6c;
    --red:        #e85555;
    --blue:       #4f9cf9;
    --purple:     #9b71f5;
    --radius:     12px;
    --radius-sm:  8px;
    --shadow:     0 4px 24px rgba(0,0,0,0.4);
    --font-head:  'Syne', sans-serif;
    --font-body:  'DM Sans', sans-serif;
    --sidebar-w:  220px;
    --transition: 0.2s cubic-bezier(0.4,0,0.2,1);
  }

  /* ── Reset ── */
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    height: 100%;
    background: var(--bg);
    color: var(--text);
    font-family: var(--font-body);
    font-size: 14px;
    line-height: 1.5;
    overflow: hidden;
  }

  /* ── Layout Shell ── */
  .app-shell {
    display: flex;
    height: 100vh;
    overflow: hidden;
  }

  /* ── Sidebar ── */
  .sidebar {
    width: var(--sidebar-w);
    background: var(--bg-2);
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    flex-shrink: 0;
    overflow: hidden;
  }

  .sidebar-logo {
    padding: 24px 20px 16px;
    border-bottom: 1px solid var(--border);
  }

  .sidebar-logo .logo-icon {
    font-size: 28px;
    display: block;
    margin-bottom: 4px;
  }

  .sidebar-logo .logo-name {
    font-family: var(--font-head);
    font-size: 18px;
    font-weight: 800;
    color: var(--accent);
    letter-spacing: -0.5px;
  }

  .sidebar-logo .logo-sub {
    font-size: 11px;
    color: var(--text-3);
    margin-top: 2px;
    letter-spacing: 0.5px;
  }

  .sidebar-nav {
    flex: 1;
    padding: 12px 0;
  }

  .nav-item {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 10px 20px;
    cursor: pointer;
    color: var(--text-2);
    font-size: 13px;
    font-weight: 500;
    border-radius: 0;
    transition: var(--transition);
    text-decoration: none;
    position: relative;
    border-left: 3px solid transparent;
  }

  .nav-item:hover {
    color: var(--text);
    background: rgba(255,255,255,0.04);
  }

  .nav-item.active {
    color: var(--accent);
    background: var(--accent-dim);
    border-left-color: var(--accent);
  }

  .nav-item .nav-icon { font-size: 17px; }

  .sidebar-footer {
    padding: 12px 20px 20px;
    border-top: 1px solid var(--border);
  }

  .cashier-badge {
    background: var(--bg-3);
    border-radius: var(--radius-sm);
    padding: 8px 12px;
    font-size: 12px;
    color: var(--text-2);
  }

  .cashier-badge span { color: var(--text); font-weight: 500; }

  /* ── Main Content ── */
  .main-content {
    flex: 1;
    overflow-y: auto;
    overflow-x: hidden;
    display: flex;
    flex-direction: column;
  }

  .page-header {
    padding: 20px 28px 0;
    border-bottom: 1px solid var(--border);
    background: var(--bg-2);
    flex-shrink: 0;
  }

  .page-title {
    font-family: var(--font-head);
    font-size: 22px;
    font-weight: 700;
    color: var(--text);
    margin-bottom: 4px;
  }

  .page-subtitle {
    font-size: 13px;
    color: var(--text-2);
    padding-bottom: 16px;
  }

  .page-body {
    flex: 1;
    padding: 24px 28px;
    overflow-y: auto;
  }

  /* ── Cards ── */
  .card {
    background: var(--bg-2);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 20px;
  }

  .card-title {
    font-family: var(--font-head);
    font-size: 14px;
    font-weight: 700;
    color: var(--text);
    margin-bottom: 16px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }

  /* ── Buttons ── */
  .btn {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 8px 16px;
    border-radius: var(--radius-sm);
    font-family: var(--font-body);
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    border: none;
    transition: var(--transition);
    white-space: nowrap;
    text-decoration: none;
  }

  .btn-primary {
    background: var(--accent);
    color: #0f0f13;
  }
  .btn-primary:hover { background: var(--accent-2); }

  .btn-ghost {
    background: transparent;
    color: var(--text-2);
    border: 1px solid var(--border);
  }
  .btn-ghost:hover { background: var(--bg-3); color: var(--text); }

  .btn-danger {
    background: rgba(232,85,85,0.15);
    color: var(--red);
    border: 1px solid rgba(232,85,85,0.25);
  }
  .btn-danger:hover { background: rgba(232,85,85,0.25); }

  .btn-success {
    background: rgba(62,207,108,0.15);
    color: var(--green);
    border: 1px solid rgba(62,207,108,0.25);
  }
  .btn-success:hover { background: rgba(62,207,108,0.25); }

  .btn-sm { padding: 5px 10px; font-size: 12px; }
  .btn-lg { padding: 11px 22px; font-size: 15px; }
  .btn-block { width: 100%; justify-content: center; }
  .btn:disabled { opacity: 0.45; cursor: not-allowed; }

  /* ── Inputs ── */
  .form-group { margin-bottom: 16px; }

  .form-label {
    display: block;
    font-size: 12px;
    font-weight: 500;
    color: var(--text-2);
    margin-bottom: 6px;
    text-transform: uppercase;
    letter-spacing: 0.4px;
  }

  .form-control {
    width: 100%;
    background: var(--bg-3);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    color: var(--text);
    font-family: var(--font-body);
    font-size: 14px;
    padding: 9px 12px;
    outline: none;
    transition: border-color var(--transition);
  }
  .form-control:focus { border-color: var(--accent); }
  .form-control::placeholder { color: var(--text-3); }

  select.form-control { cursor: pointer; }

  /* ── Badges & Status ── */
  .badge {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    padding: 3px 8px;
    border-radius: 20px;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.3px;
    text-transform: uppercase;
  }

  .badge-pending   { background: rgba(79,156,249,0.15);  color: var(--blue); }
  .badge-preparing { background: rgba(232,168,56,0.15);  color: var(--accent); }
  .badge-done      { background: rgba(62,207,108,0.15);  color: var(--green); }
  .badge-cancelled { background: rgba(232,85,85,0.15);   color: var(--red); }
  .badge-available { background: rgba(62,207,108,0.12);  color: var(--green); }
  .badge-unavail   { background: rgba(232,85,85,0.12);   color: var(--red); }

  /* ── Modal ── */
  .modal-overlay {
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.75);
    display: flex; align-items: center; justify-content: center;
    z-index: 1000;
    opacity: 0; pointer-events: none;
    transition: opacity var(--transition);
    backdrop-filter: blur(4px);
  }
  .modal-overlay.open { opacity: 1; pointer-events: all; }

  .modal {
    background: var(--bg-2);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 28px;
    width: 90%;
    max-width: 480px;
    max-height: 90vh;
    overflow-y: auto;
    transform: translateY(16px) scale(0.97);
    transition: transform var(--transition);
    box-shadow: var(--shadow);
  }
  .modal-overlay.open .modal { transform: translateY(0) scale(1); }

  .modal-header {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    margin-bottom: 20px;
  }
  .modal-title {
    font-family: var(--font-head);
    font-size: 18px;
    font-weight: 700;
  }
  .modal-close {
    background: var(--bg-3); border: none;
    color: var(--text-2); cursor: pointer;
    width: 28px; height: 28px;
    border-radius: 50%; font-size: 16px;
    display: flex; align-items: center; justify-content: center;
    transition: var(--transition);
  }
  .modal-close:hover { background: var(--border); color: var(--text); }

  /* ── Toast Notification ── */
  .toast-container {
    position: fixed; bottom: 24px; right: 24px;
    display: flex; flex-direction: column; gap: 8px;
    z-index: 9999;
  }
  .toast {
    background: var(--bg-2);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    padding: 12px 16px;
    font-size: 13px;
    color: var(--text);
    box-shadow: var(--shadow);
    display: flex; align-items: center; gap: 10px;
    animation: slideUp 0.25s ease;
    min-width: 260px;
  }
  .toast.success { border-left: 3px solid var(--green); }
  .toast.error   { border-left: 3px solid var(--red); }
  .toast.info    { border-left: 3px solid var(--accent); }

  @keyframes slideUp {
    from { transform: translateY(12px); opacity: 0; }
    to   { transform: translateY(0);    opacity: 1; }
  }

  /* ── Loading Spinner ── */
  .spinner {
    width: 20px; height: 20px;
    border: 2px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
    display: inline-block;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  .loading-overlay {
    position: fixed; inset: 0;
    background: rgba(15,15,19,0.8);
    display: flex; align-items: center; justify-content: center;
    z-index: 5000;
    backdrop-filter: blur(2px);
  }

  /* ── Scrollbar ── */
  ::-webkit-scrollbar { width: 6px; height: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }
  ::-webkit-scrollbar-thumb:hover { background: var(--text-3); }

  /* ── Utility ── */
  .text-accent { color: var(--accent); }
  .text-muted  { color: var(--text-2); }
  .text-green  { color: var(--green); }
  .text-red    { color: var(--red); }
  .text-right  { text-align: right; }
  .mt-0 { margin-top: 0; }
  .mt-8 { margin-top: 8px; }
  .mt-16{ margin-top: 16px; }
  .flex { display: flex; }
  .flex-1 { flex: 1; }
  .items-center { align-items: center; }
  .justify-between { justify-content: space-between; }
  .gap-8  { gap: 8px; }
  .gap-12 { gap: 12px; }
  .w-full { width: 100%; }
  .hidden { display: none !important; }
  .divider { border: none; border-top: 1px solid var(--border); margin: 16px 0; }
  .empty-state {
    text-align: center; padding: 40px 20px;
    color: var(--text-3);
  }
  .empty-state .empty-icon { font-size: 40px; display: block; margin-bottom: 12px; }
  .empty-state p { font-size: 13px; }
</style>
