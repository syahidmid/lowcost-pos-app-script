<script>
  /* ── Show hamburger on mobile only ── */
  if (window.innerWidth < 768) {
    document.getElementById('hamburgerWrap').style.display = 'block';
  }

  /* ── Hamburger toggle ── */
  function toggleHamburger() {
    var dropdown = document.getElementById('hamburgerDropdown');
    var btn = document.getElementById('hamburgerBtn');
    var isOpen = dropdown.style.display === 'block';
    if (isOpen) {
      dropdown.style.display = 'none';
      btn.style.background = 'var(--bg-3)';
      btn.style.color = 'var(--text-2)';
    } else {
      dropdown.style.display = 'block';
      btn.style.background = 'var(--accent-dim)';
      btn.style.color = 'var(--accent)';
    }
  }

  /* ── Close on outside click ── */
  document.addEventListener('click', function (e) {
    var wrap = document.getElementById('hamburgerWrap');
    if (wrap && !wrap.contains(e.target)) {
      document.getElementById('hamburgerDropdown').style.display = 'none';
      document.getElementById('hamburgerBtn').style.background = 'var(--bg-3)';
      document.getElementById('hamburgerBtn').style.color = 'var(--text-2)';
    }
  });

  /* ── Navigation ── */
  function navigate(page) {
    google.script.run
      .withSuccessHandler(function (url) {
        var base = url.split('?')[0];
        window.top.location.href = base + '?page=' + page;
      })
      .getScriptUrl();
  }

  /* ── Sidebar info ── */
  google.script.run
    .withSuccessHandler(function (json) {
      var s = JSON.parse(json);
      var shopEl = document.getElementById('sidebarShopName');
      var cashEl = document.getElementById('sidebarCashier');
      var initEl = document.getElementById('cashierInitial');
      if (shopEl && s.shop_name) shopEl.textContent = s.shop_name;
      if (cashEl && s.cashier_name) cashEl.textContent = s.cashier_name;
      if (initEl && s.cashier_name) initEl.textContent = s.cashier_name.charAt(0).toUpperCase();
    })
    .withFailureHandler(function (err) { console.warn('Sidebar error:', err); })
    .apiGetSettings();
</script>
