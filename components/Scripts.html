<script>
// ============================================================
// Shared JS Utilities — included on every page
// ============================================================

// ── Toast Notification ────────────────────────────────────
const Toast = (() => {
  let container;
  function getContainer() {
    if (!container) {
      container = document.createElement('div');
      container.className = 'toast-container';
      document.body.appendChild(container);
    }
    return container;
  }
  function show(message, type = 'info', duration = 3000) {
    const icons = { success: '✅', error: '❌', info: 'ℹ️' };
    const toast = document.createElement('div');
    toast.className = `toast ${type}`;
    toast.innerHTML = `<span>${icons[type] || 'ℹ️'}</span><span>${message}</span>`;
    getContainer().appendChild(toast);
    setTimeout(() => {
      toast.style.opacity = '0';
      toast.style.transform = 'translateY(8px)';
      toast.style.transition = '0.2s ease';
      setTimeout(() => toast.remove(), 200);
    }, duration);
  }
  return {
    success: (msg, d) => show(msg, 'success', d),
    error:   (msg, d) => show(msg, 'error', d),
    info:    (msg, d) => show(msg, 'info', d),
  };
})();

// ── Modal helpers ─────────────────────────────────────────
function openModal(id) {
  const el = document.getElementById(id);
  if (el) el.classList.add('open');
}
function closeModal(id) {
  const el = document.getElementById(id);
  if (el) el.classList.remove('open');
}
function closeModalOnOverlay(event, id) {
  if (event.target.id === id) closeModal(id);
}

// ── Loading overlay ───────────────────────────────────────
const Loader = (() => {
  let overlay;
  function get() {
    if (!overlay) {
      overlay = document.createElement('div');
      overlay.className = 'loading-overlay';
      overlay.innerHTML = '<div class="spinner" style="width:36px;height:36px;border-width:3px;"></div>';
      document.body.appendChild(overlay);
    }
    return overlay;
  }
  return {
    show: () => { get().style.display = 'flex'; },
    hide: () => { get().style.display = 'none'; },
  };
})();

// ── Currency formatter ────────────────────────────────────
function formatIDR(amount) {
  return 'Rp ' + Number(amount).toLocaleString('id-ID');
}

// ── Date helpers ──────────────────────────────────────────
function formatDate(isoString) {
  if (!isoString) return '—';
  return new Date(isoString).toLocaleString('id-ID', {
    day: '2-digit', month: 'short', year: 'numeric',
    hour: '2-digit', minute: '2-digit',
  });
}

function todayISO() {
  return new Date().toISOString().split('T')[0];
}

// ── GAS call wrapper ──────────────────────────────────────
function gasCall(fnName, ...args) {
  return new Promise((resolve, reject) => {
    let runner = google.script.run
      .withSuccessHandler(res => {
        try { resolve(JSON.parse(res)); }
        catch { resolve(res); }
      })
      .withFailureHandler(err => reject(err));
    runner[fnName](...args);
  });
}

// ── Status badge HTML ─────────────────────────────────────
function statusBadge(status) {
  const map = {
    pending:   '<span class="badge badge-pending">⏳ Pending</span>',
    preparing: '<span class="badge badge-preparing">🔥 Preparing</span>',
    done:      '<span class="badge badge-done">✅ Done</span>',
    cancelled: '<span class="badge badge-cancelled">❌ Batal</span>',
  };
  return map[status] || `<span class="badge">${status}</span>`;
}

// Close modals on ESC
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') {
    document.querySelectorAll('.modal-overlay.open').forEach(m => m.classList.remove('open'));
  }
});
</script>
